<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clasificador de Vehiculos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2e3144;
      --accent:  #4f8ef7;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --ok:      #22c55e;
      --warn:    #f59e0b;
      --err:     #ef4444;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .dot.ok  { background: var(--ok); }
    .dot.err { background: var(--err); }

    /* LAYOUT */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 900px;
      margin: 32px auto;
      padding: 0 24px 48px;
    }

    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; padding: 0 16px 32px; }
      header  { padding: 14px 16px; }
    }

    /* PANEL */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-title {
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    /* UPLOAD */
    .drop-zone {
      margin: 16px;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      background: rgba(79,142,247,0.04);
    }
    .drop-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-title { font-size: 14px; font-weight: 500; margin-bottom: 5px; }
    .drop-sub   { font-size: 12px; color: var(--muted); }

    /* PREVIEW */
    .preview {
      margin: 0 16px;
      border-radius: 8px;
      overflow: hidden;
      background: #0a0a0a;
      aspect-ratio: 4/3;
      display: none;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .preview.show { display: flex; }
    .preview img { width: 100%; height: 100%; object-fit: contain; }
    .preview-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 8px 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-name { font-size: 11px; color: rgba(255,255,255,0.6); font-family: monospace; }
    .btn-change {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-change:hover { background: rgba(255,255,255,0.1); }

    /* ERROR */
    .error-box {
      margin: 12px 16px;
      padding: 10px 13px;
      border: 1px solid rgba(239,68,68,0.3);
      background: rgba(239,68,68,0.06);
      border-radius: 6px;
      display: none;
      font-size: 12px;
      color: var(--err);
      line-height: 1.5;
    }
    .error-box.show { display: block; }

    /* BUTTON */
    .btn-analyze {
      display: block;
      width: calc(100% - 32px);
      margin: 14px 16px 16px;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-analyze:hover:not(:disabled) { opacity: 0.88; }
    .btn-analyze:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-analyze.loading { color: transparent; }
    .btn-analyze.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 15px; height: 15px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    /* RESULT — empty */
    .result-empty {
      padding: 52px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* RESULT — filled */
    .result-body { padding: 16px; display: none; }
    .result-body.show {
      display: block;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }

    .res-main {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .res-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .res-tipo  { font-size: 26px; font-weight: 700; margin-bottom: 4px; }

    .res-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .pct-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .pct-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .pct-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.7s ease;
      width: 0;
    }
    .pct-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      min-width: 70px;
      text-align: right;
    }
    .conf-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
    }
    .conf-tag.alta  { background: rgba(34,197,94,0.15);  color: var(--ok);   border: 1px solid rgba(34,197,94,0.25); }
    .conf-tag.media { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.25); }
    .conf-tag.baja  { background: rgba(239,68,68,0.15);  color: var(--err);  border: 1px solid rgba(239,68,68,0.25); }

    .res-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.65;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* TOP 3 */
    .top3-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .top3-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 5px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .top3-item.first { border-color: rgba(79,142,247,0.35); }
    .t3-rank { font-size: 12px; font-weight: 700; color: var(--muted); width: 16px; }
    .top3-item.first .t3-rank { color: var(--accent); }
    .t3-name { flex: 1; font-size: 13px; }
    .t3-bar  { width: 50px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .t3-fill { height: 100%; background: var(--accent); border-radius: 2px; }
    .t3-pct  { font-size: 12px; font-weight: 600; min-width: 38px; text-align: right; }
  </style>
</head>
<body>

<header>
  <h1>Clasificador de Vehiculos</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Conectando...</span>
  </div>
</header>

<div class="layout">

  <!-- PANEL IZQUIERDO: subida -->
  <div class="panel">
    <div class="panel-title">Imagen</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp"/>
      <div class="drop-title">Arrastra o selecciona una imagen</div>
      <div class="drop-sub">JPG, PNG o WEBP — max. 10 MB</div>
    </div>

    <div class="preview" id="preview">
      <img id="previewImg" src="" alt="preview"/>
      <div class="preview-footer">
        <span class="preview-name" id="previewName"></span>
        <button class="btn-change" onclick="reset()">Cambiar</button>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <button class="btn-analyze" id="btnAnalyze" onclick="analizar()" disabled>
      Clasificar
    </button>
  </div>

  <!-- PANEL DERECHO: resultado -->
  <div class="panel">
    <div class="panel-title">Resultado</div>

    <div class="result-empty" id="resultEmpty">
      Sube una imagen para ver el resultado
    </div>

    <div class="result-body" id="resultBody">
      <div class="res-main">
        <div class="res-label">Tipo detectado</div>
        <div class="res-header">
          <div class="res-tipo" id="resTipo">—</div>
          <span class="conf-tag" id="confTag"></span>
        </div>

        <div class="pct-row">
          <div class="pct-track"><div class="pct-fill" id="pctFill"></div></div>
          <div class="pct-num" id="pctNum">0%</div>
        </div>

        <div class="res-desc" id="resDesc"></div>
      </div>

      <div class="top3-title">Otras posibilidades</div>
      <div id="top3"></div>
    </div>
  </div>

</div>

<script>
  let archivo = null;

  addEventListener('DOMContentLoaded', () => {
    checkHealth();
    setupDrop();
  });

  async function checkHealth() {
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    try {
      const r = await fetch('/health');
      const d = await r.json();
      if (d.modelo_cargado) {
        dot.className = 'dot ok';
        txt.textContent = `Modelo listo — ${d.total_clases} clases`;
      } else {
        dot.className = 'dot err';
        txt.textContent = 'Modelo no encontrado';
      }
    } catch {
      dot.className = 'dot err';
      txt.textContent = 'Sin conexion con el servidor';
    }
  }

  function setupDrop() {
    const zone = document.getElementById('dropZone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('over'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    document.getElementById('fileInput').addEventListener('change', e => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });
  }

  function handleFile(file) {
    hideError();
    const tipos = ['image/jpeg', 'image/png', 'image/webp'];
    if (!tipos.includes(file.type)) { showError('Formato no soportado. Usa JPG, PNG o WEBP.'); return; }
    if (file.size > 10 * 1024 * 1024) { showError('Imagen muy grande. Maximo 10 MB.'); return; }

    archivo = file;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('previewName').textContent = file.name;
      document.getElementById('dropZone').style.display = 'none';
      document.getElementById('preview').classList.add('show');
      document.getElementById('btnAnalyze').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  function reset() {
    archivo = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('preview').classList.remove('show');
    document.getElementById('dropZone').style.display = '';
    document.getElementById('btnAnalyze').disabled = true;
    hideError();
    hideResult();
  }

  async function analizar() {
    if (!archivo) return;
    const btn = document.getElementById('btnAnalyze');
    btn.disabled = true;
    btn.classList.add('loading');
    hideError();
    hideResult();

    try {
      const fd = new FormData();
      fd.append('file', archivo);
      const r = await fetch('/predict', { method: 'POST', body: fd });
      if (!r.ok) {
        const e = await r.json();
        throw new Error(e.detail || `Error ${r.status}`);
      }
      mostrarResultado(await r.json());
    } catch (e) {
      showError('Error al clasificar: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function mostrarResultado(data) {
    const p = data.prediccion_principal;
    document.getElementById('resultEmpty').style.display = 'none';
    document.getElementById('resultBody').classList.add('show');

    document.getElementById('resTipo').textContent = p.titulo;
    document.getElementById('pctNum').textContent  = p.porcentaje.toFixed(1) + '%';

    requestAnimationFrame(() => {
      document.getElementById('pctFill').style.width = p.porcentaje + '%';
    });

    const ct = document.getElementById('confTag');
    ct.className = 'conf-tag ' + p.confianza.toLowerCase();
    ct.textContent = p.confianza;

    document.getElementById('resDesc').textContent = p.descripcion;

    const t3 = document.getElementById('top3');
    t3.innerHTML = '';
    data.top_3.forEach((item, i) => {
      const d = document.createElement('div');
      d.className = 'top3-item' + (i === 0 ? ' first' : '');
      d.innerHTML = `
        <span class="t3-rank">${i + 1}</span>
        <span class="t3-name">${item.titulo}</span>
        <div class="t3-bar"><div class="t3-fill" style="width:${item.porcentaje}%"></div></div>
        <span class="t3-pct">${item.porcentaje.toFixed(1)}%</span>
      `;
      t3.appendChild(d);
    });
  }

  function hideResult() {
    document.getElementById('resultEmpty').style.display = '';
    document.getElementById('resultBody').classList.remove('show');
  }
  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = msg;
    b.classList.add('show');
  }
  function hideError() {
    document.getElementById('errorBox').classList.remove('show');
  }
</script>
</body>
</html>
